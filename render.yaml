services:
  - type: web
    name: ethicalguard-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ethicalguard-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: ethicalguard-db
    plan: starter
